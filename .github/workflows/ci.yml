name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Testcontainers가 ubuntu-latest 러너에 이미 있는 Docker를 그대로 쓴다 —
      # MySQL/RabbitMQ를 따로 띄울 필요 없이 ./gradlew test 안에서 컨테이너가 자동으로 뜬다.
      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test
