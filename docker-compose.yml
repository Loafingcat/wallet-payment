services:
  mysql:
    image: mysql:8.0
    container_name: wallet-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: wallet
      MYSQL_USER: wallet
      MYSQL_PASSWORD: wallet1234
      MYSQL_ROOT_PASSWORD: root1234
    volumes:
      - wallet-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: wallet-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # 관리 UI (http://localhost:15672, guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  fake-pg:
    build:
      context: .
      dockerfile: fake-pg/Dockerfile
    container_name: wallet-fake-pg
    ports:
      - "9999:9999"

volumes:
  wallet-mysql-data:
